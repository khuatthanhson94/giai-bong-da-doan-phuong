# Reverse proxy — Giải Bóng đá Đoàn phường
# /api -> Laravel backend
# / -> Next.js frontend
# /ws -> Laravel Reverb WebSocket
# /storage -> static uploads

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 64M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check (nginx only)
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # Laravel API
    location /api {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;

        # Strip /api prefix, forward to Laravel public/index.php
        rewrite ^/api/?(.*)$ /$1 break;

        include fastcgi_params;
        fastcgi_pass backend_fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param REQUEST_URI $uri$is_args$args;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Laravel Sanctum / broadcasting auth
    location /broadcasting {
        include fastcgi_params;
        fastcgi_pass backend_fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param REQUEST_URI $uri$is_args$args;
    }

    # WebSocket — Laravel Reverb
    location /ws {
        proxy_pass http://reverb_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Static uploads from Laravel storage
    location /storage {
        alias /var/www/backend/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Laravel public assets (if any)
    location ~ ^/(css|js|images|fonts)/ {
        root /var/www/backend/public;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # Auth endpoints — stricter rate limit
    location ~ ^/api/(v1/)?auth/(login|register|refresh) {
        limit_req zone=auth_limit burst=10 nodelay;

        rewrite ^/api/?(.*)$ /$1 break;
        include fastcgi_params;
        fastcgi_pass backend_fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param REQUEST_URI $uri$is_args$args;
    }

    # Next.js frontend (default)
    location / {
        proxy_pass http://frontend_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static & HMR (dev)
    location /_next {
        proxy_pass http://frontend_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
