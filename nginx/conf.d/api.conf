server {
    listen 80;
    server_name _;

    # Let Laravel handle all routes, including API
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass backend_fpm:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Optional health endpoint (can be accessed directly)
    location /health {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
