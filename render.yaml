services:
  - type: web
    name: giai-bong-da-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://giai-bong-da-doan-phuong-tung-thien.vercel.app
      - key: PORT
        value: 3004
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/backend/data
      sizeGB: 1
