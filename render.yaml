services:
  - type: web
    name: giai-bong-da-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://giai-bong-da-doan-phuong.vercel.app
      - key: PORT
        value: 3004
