# Production overrides — dùng kèm docker-compose.yml
# docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d

services:
  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ../nginx/ssl.conf.example:/etc/nginx/conf.d/ssl.conf:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    build:
      target: production
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  backend:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: warning
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  postgres:
    ports: []  # Không expose ra ngoài trong production
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    ports: []
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  queue:
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --memory=256
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  reverb:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  scheduler:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
