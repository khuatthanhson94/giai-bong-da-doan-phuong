# Development overrides — hot reload, debug, exposed ports
# docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up -d

services:
  nginx:
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: development
    command: npm run dev
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_API_URL: http://localhost:${HTTP_PORT:-8080}/api
      NEXT_PUBLIC_WS_URL: ws://localhost:${HTTP_PORT:-8080}/ws
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FRONTEND_DEV_PORT:-3000}:3000"

  backend:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_LEVEL: debug
    volumes:
      - ../backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
      - backend_storage:/var/www/backend/storage
    ports:
      - "${BACKEND_DEV_PORT:-9000}:9000"

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  reverb:
    ports:
      - "${REVERB_PORT:-8081}:8080"
    environment:
      APP_DEBUG: "true"

  queue:
    command: php artisan queue:listen redis --sleep=3 --tries=1 --timeout=0
