name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  POSTGRES_DB: giai_bong_da_test
  POSTGRES_USER: giai_bong_da
  POSTGRES_PASSWORD: test_password
  REDIS_HOST: localhost
  JWT_SECRET: ci_test_jwt_secret_min_32_characters

jobs:
  backend-tests:
    name: Backend Tests (PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: giai_bong_da_test
          POSTGRES_USER: giai_bong_da
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pgsql, redis, gd, zip, bcmath, intl
          coverage: xdebug

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction
        continue-on-error: true

      - name: Copy .env
        run: |
          cp .env.example .env 2>/dev/null || cp .env.ci .env 2>/dev/null || true
          php artisan key:generate --force 2>/dev/null || true

      - name: Run migrations
        run: php artisan migrate --force
        continue-on-error: true
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: giai_bong_da_test
          DB_USERNAME: giai_bong_da
          DB_PASSWORD: test_password

      - name: Run PHPUnit
        run: php artisan test --parallel
        continue-on-error: true
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: giai_bong_da_test
          DB_USERNAME: giai_bong_da
          DB_PASSWORD: test_password

      - name: PHP Code Style (Pint)
        run: ./vendor/bin/pint --test
        continue-on-error: true

  frontend-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api
          NEXT_PUBLIC_WS_URL: ws://localhost/ws

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/backend/Dockerfile
          push: false
          tags: gbd-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/frontend/Dockerfile
          target: production
          push: false
          tags: gbd-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose
        run: |
          docker compose -f docker/docker-compose.yml config > /dev/null
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml config > /dev/null
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml config > /dev/null
